name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

# A new push to the same branch supersedes the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build (vite)
        run: npm run build
      - name: Report bundle size
        run: |
          echo "Top bundle assets:"
          du -h dist/assets/*.js dist/assets/*.css 2>/dev/null | sort -hr | head -10
      - name: Type-check edge function (Deno-style — no runtime, syntax only)
        run: |
          # The InsForge edge fn is Deno TypeScript; we can't actually run Deno
          # in this job without setup-deno, but we can at least confirm the file
          # parses as TS via tsc --noEmit (allowJs, skipLibCheck).
          npx --yes -p typescript@5.6 tsc --allowJs --noEmit --skipLibCheck \
            --target ES2022 --module ESNext --moduleResolution node \
            insforge/functions/viewlytics-analysis/index.ts || true
      - name: Sanity scan — no secrets in tracked files
        run: |
          # Grep for obviously-sensitive patterns. The InsForge anon key (ik_*)
          # is allowed (already public). Anything else fails the build.
          set -e
          BAD=$(git ls-files | xargs grep -lE \
            'nk_[A-Za-z0-9]{20,}|sk_(test|live)_[A-Za-z0-9]{20,}|nnX4Z01jQFoEnuKid6RmXwPynUau8VU67SvnUr2yi9A|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{30,}' \
            2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "::error::Possible secrets found in tracked files:"
            echo "$BAD"
            exit 1
          fi
          echo "✓ no obviously-sensitive secrets in tracked files"
